defaults:
  ssh_user: fabriksys
  ssh_port: 22
  ssh_key: /app/config/ssh_keys/id_rsa
  check_interval: 30

machines:
- name: ai-brain-01
  ip: 192.168.44.10
  description: Control Plane – Agent0, Ollama, Dashboard
  role: controller
  ssh_user: larsbruckschen
  tags: [docker-host, dashboard, agent0, ollama]

- name: ci-runner-01
  ip: 192.168.44.20
  description: Self-Hosted CI Runner
  role: builder
  tags: [ci, github-actions]

- name: staging-01
  ip: 192.168.44.30
  description: Staging Runtime
  role: staging
  tags: [docker-host, staging]

- name: qa-agent-01
  ip: 192.168.44.40
  description: QA Pull Agent
  role: reviewer
  tags: [docker-host, qa-agent]

- name: dispatcher-01
  ip: 192.168.44.70
  description: Policy Engine / State Machine
  role: orchestrator
  tags: [docker-host, dispatcher]

- name: openwebui-01
  ip: 192.168.44.100
  description: OpenWebUI
  role: agent
  tags: [docker-host, openwebui]

- name: dev-agent-01
  ip: 192.168.44.101
  description: Dev Pull Agent (Coding)
  role: agent
  tags: [docker-host, dev-agent]

auto_discovery:
  enabled: false
  subnet: 192.168.44.0/24
  exclude_ips: [192.168.44.255]
  default_role: agent
  ssh_fingerprint_check: false

agent_roles:
  controller:
    description: Control Plane (Agent0, Dashboard)
    services: [docker, fabrik-dashboard, agent0]
  builder:
    description: CI Runner
    services: [github-actions-runner]
  staging:
    description: Staging Environment
    services: [docker]
  reviewer:
    description: QA Agent
    services: [docker, qa-agent]
  orchestrator:
    description: Dispatcher / State Machine
    services: [docker, dispatcher]
  agent:
    description: Worker Agent
    services: [docker]
